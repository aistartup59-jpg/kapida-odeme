version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: kapida
      POSTGRES_PASSWORD: kapida
      POSTGRES_DB: kapida_dev
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Dedicated to the Backend Integration Test Suite (backend/test/integration).
  # Deliberately has no volume: each test run should be able to start from a clean DB.
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_USER: kapida
      POSTGRES_PASSWORD: kapida
      POSTGRES_DB: kapida_test
    ports:
      - "5433:5432"

  backend:
    build: .
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: kapida
      DATABASE_PASSWORD: kapida
      DATABASE_NAME: kapida_dev
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in the environment or a .env file next to docker-compose.yml}
      CREDENTIAL_ENCRYPTION_SECRET: ${CREDENTIAL_ENCRYPTION_SECRET:?CREDENTIAL_ENCRYPTION_SECRET must be set in the environment or a .env file next to docker-compose.yml}

volumes:
  db-data:
